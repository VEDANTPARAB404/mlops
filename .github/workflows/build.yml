name: CI/CD Docker Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/ml-predictor
        tags: |
          type=raw,value=latest
          type=sha,prefix=sha-

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  trigger-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Trigger deployment webhook (if configured)
      env:
        DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      run: |
        if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
          echo "DEPLOY_WEBHOOK_URL not configured. Skipping deployment trigger."
          exit 0
        fi
        curl -sS -X POST "$DEPLOY_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{\"image\":\"${{ secrets.DOCKER_USERNAME }}/ml-predictor\",\"tag\":\"$IMAGE_TAG\"}"
